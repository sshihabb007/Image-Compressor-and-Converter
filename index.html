<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mehedi Hasan Shihab Image Converter and compressor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-900 text-white font-sans antialiased min-h-screen flex items-center justify-center p-4">
    <div class="max-w-4xl w-full p-8 space-y-8 bg-gray-800 rounded-2xl shadow-2xl border border-gray-700">
        <!-- Header -->
        <div class="text-center space-y-2">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-purple-500 to-pink-500">
                Mehedi Hasan Shihab Image Converter and compressor
            </h1>
            <p class="text-gray-400 font-medium">Local, private, and lightning-fast format conversion by sshihabb007</p>
        </div>

        <!-- The Drop Zone -->
        <div id="Mehedi_dropZoneId" class="relative group border-4 border-dashed border-gray-600 rounded-xl p-16 text-center hover:border-blue-500 hover:bg-gray-700/50 transition-all duration-300 cursor-pointer bg-gray-800">
            <input type="file" id="sshihabb007_fileInputId" class="peer absolute inset-0 w-full h-full opacity-0 cursor-pointer z-50" accept="image/*">
            <div class="space-y-4 group-hover:scale-105 transition-transform duration-300">
                <svg class="mx-auto h-20 w-20 text-gray-400 group-hover:text-blue-500 transition-colors duration-300 peer-focus:text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                </svg>
                <p class="text-xl text-gray-300 font-medium"><span class="text-blue-400 font-semibold peer-focus:underline">Click to upload</span> or drag and drop</p>
                <p class="text-sm text-gray-500">Supports PNG, JPG, WEBP (up to 50MB)</p>
            </div>
        </div>

        <!-- The Settings Panel -->
        <div id="Shihab_settingsPanelId" class="grid grid-cols-1 md:grid-cols-2 gap-8 bg-gray-750 border border-gray-700 p-6 rounded-xl opacity-50 pointer-events-none transition-opacity duration-300 bg-gray-900/30">
            <div class="space-y-3">
                <label class="block text-sm font-semibold text-gray-300 uppercase tracking-wider">Output Format</label>
                <select id="Mehedi_formatSelectId" class="w-full bg-gray-800 border border-gray-600 rounded-lg shadow-inner py-3 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-white transition-all">
                    <option value="jpeg">JPEG</option>
                    <option value="png">PNG</option>
                    <option value="webp" id="sshihabb007_webpOptionId">WebP</option>
                </select>
            </div>
            
            <div class="space-y-3">
                <label class="block text-sm font-semibold text-gray-300 uppercase tracking-wider flex justify-between">
                    <span>Quality Compression</span>
                    <span id="Shihab_qualityValueId" class="text-blue-400 font-bold bg-blue-900/30 px-2 py-0.5 rounded">80%</span>
                </label>
                <input type="range" id="sshihabb007_qualitySliderId" min="0" max="100" value="80" class="w-full h-2 bg-gray-600 rounded-lg appearance-none cursor-pointer accent-blue-500 hover:accent-blue-400 transition-all mt-3">
            </div>

            <div class="space-y-2 md:col-span-2 flex items-center p-3 bg-gray-800 rounded-lg border border-gray-700 hover:border-gray-600 transition-colors">
                <input type="checkbox" id="Mehedi_resizeCheckboxId" class="w-5 h-5 text-blue-600 bg-gray-900 border-gray-600 rounded focus:ring-blue-500 focus:ring-offset-gray-800 cursor-pointer">
                <label for="Mehedi_resizeCheckboxId" class="ml-3 text-sm font-medium text-gray-300 cursor-pointer select-none">
                    Resize large images (Cap maximum width/height at 2000px)
                </label>
            </div>
        </div>

        <!-- The Preview Area -->
        <div id="sshihabb007_previewAreaId" class="hidden space-y-8 animate-[fadeIn_0.5s_ease-out]">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Original Image -->
                <div class="space-y-4">
                    <h3 class="text-xl font-semibold text-gray-200 flex items-center"><span class="w-2 h-2 rounded-full bg-gray-400 mr-2"></span> Original File</h3>
                    <div class="aspect-video bg-gray-900 rounded-xl overflow-hidden flex items-center justify-center border border-gray-700 relative group shadow-inner">
                        <img id="Shihab_originalImgId" class="max-w-full max-h-full object-contain p-2" src="" alt="Original Preview">
                        <div class="absolute bottom-0 inset-x-0 bg-gradient-to-t from-black/90 to-transparent pt-8 pb-3 px-4 text-sm text-center flex justify-between items-end opacity-90">
                            <span id="Mehedi_originalSizeId" class="font-mono text-gray-300 bg-gray-800 px-2 py-1 rounded">0 KB</span>
                            <span id="sshihabb007_originalDimensionsId" class="font-mono text-gray-400">0 x 0</span>
                        </div>
                    </div>
                </div>

                <!-- Converted Image -->
                <div class="space-y-4">
                    <h3 class="text-xl font-semibold text-gray-200 flex items-center"><span class="w-2 h-2 rounded-full bg-blue-500 mr-2"></span> Converted Result</h3>
                    <div class="aspect-video bg-gray-900 rounded-xl overflow-hidden flex items-center justify-center border border-blue-500/50 relative group shadow-[0_0_15px_rgba(59,130,246,0.15)]">
                        <img id="Mehedi_convertedImgId" class="max-w-full max-h-full object-contain p-2" src="" alt="Converted Preview">
                        <div class="absolute bottom-0 inset-x-0 bg-gradient-to-t from-black/90 to-transparent pt-8 pb-3 px-4 text-sm text-center flex justify-between items-end opacity-90">
                            <span id="Shihab_convertedSizeId" class="font-mono text-green-400 font-bold bg-green-900/30 px-2 py-1 rounded border border-green-500/30">0 KB</span>
                            <span id="sshihabb007_convertedDimensionsId" class="font-mono text-blue-300">0 x 0</span>
                        </div>
                    </div>
                </div>
            </div>

            <button id="Mehedi_downloadBtnId" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold py-4 px-6 rounded-xl shadow-[0_0_20px_rgba(59,130,246,0.4)] transform transition duration-200 hover:-translate-y-1 hover:shadow-[0_0_25px_rgba(59,130,246,0.6)] focus:outline-none focus:ring-4 focus:ring-blue-500/50 flex justify-center items-center space-x-3 text-lg">
                <svg class="w-6 h-6 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                <span>Download Converted Image</span>
            </button>
        </div>
    </div>
    
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <script src="script.js"></script>
</body>
</html>
